<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-50 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" alt="github-logo" class="h-8 w-auto">
            <span class="text-xl font-bold text-black">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Search issues..." 
                    class="w-80 border border-gray-200 rounded-md py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400 text-sm"></i>
            </div>
            <button class="bg-[#4A00FF] hover:bg-[#4A00D6] text-white px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap transition-colors">
                + New Issue
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6 md:p-10">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-10 flex flex-col md:flex-row items-center gap-6">
            <button onclick="filterIssues('all', this)" id="allBtn" class="tab-btn px-12 py-2 rounded font-semibold text-sm bg-[#4A00FF] text-white">All</button>
            <button onclick="filterIssues('open', this)" class="tab-btn px-10 py-2 border border-solid border-gray-300 rounded font-semibold text-sm text-gray-600">Open</button>
            <button onclick="filterIssues('closed', this)" class="tab-btn px-10 py-2 border border-solid border-gray-300 rounded font-semibold text-sm text-gray-600">Closed</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            
            <div class="p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-[#ECE4FF] rounded-full flex items-center justify-center">
                        <img src="assets/Aperture.png" alt="Icon" class="w-8 h-8">
                    </div>
                    <div>
                        <h2 class="text-3xl font-semibold text-black"><span id="countDisplay">0</span> Issues</h2>
                        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-6">
                    <div class="flex items-center gap-2 text-sm font-bold text-gray-800">
                        <span class="w-3 h-3 bg-[#00A96E] rounded-full"></span> Open
                    </div>
                    <div class="flex items-center gap-2 text-sm font-bold text-gray-800">
                        <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span> Closed
                    </div>
                </div>
            </div>

            <hr class="border-gray-300">

            
    <script src="script.js"></script>
</body>
</html>

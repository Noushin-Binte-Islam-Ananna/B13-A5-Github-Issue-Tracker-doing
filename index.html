<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="./assets/github-logo.png" alt="github-logo" class="w-20 h-20">
            </div>
            <h1 class="text-3xl font-bold text-black">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-2">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-black mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 ring-indigo-500 ">
                <p class="text-[11px] text-indigo-600 mt-1">Default: admin</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-black mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-indigo-500">
                <p class="text-[11px] text-indigo-600 mt-1">Default: admin123</p>
            </div>

            <button type="submit" 
                class="w-full bg-[#4A00FF] hover:bg-[#4A00D6] text-white font-semibold py-3 rounded-lg transition-colors shadow-md">
                Sign In
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-600">OR</span></div>
        </div>

        <div class="text-center">
            <p class="text-sm text-gray-500 mb-2">Demo Credentials:</p>
            <div class="bg-gray-100 p-4 rounded-lg">
                <p class="text-sm text-gray-700"><strong>Username:</strong> admin</p>
                <p class="text-sm text-gray-700"><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
